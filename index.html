<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f4f1ea">
<title>コーピング</title>
<style>
  :root{
    --bg:#f4f1ea; --card:#fffdf8; --ink:#4a443a; --ink-soft:#8a8275;
    --line:#e6e0d4; --accent:#7a9e7e; --accent-soft:#eaf1ea;
    --highlight:#fdf3e0; --highlight-ink:#b07d3a; --danger:#c07b6b;
    --rec:#f3ede1;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#211f1b; --card:#2b2823; --ink:#e8e3d8; --ink-soft:#9a9285;
      --line:#3a362f; --accent:#8fb893; --accent-soft:#33403425;
      --highlight:#3a3225; --highlight-ink:#d9a85e; --danger:#d18f7f;
      --rec:#322e27;
    }
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{font-size:16px}
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:78px;line-height:1.5;
  }
  header{padding:16px 18px 8px;display:flex;justify-content:space-between;align-items:baseline}
  header h1{font-size:1.1rem;font-weight:700;letter-spacing:.05em}
  header .date{font-size:.8rem;color:var(--ink-soft)}

  /* time filter */
  .filters{display:flex;gap:7px;padding:4px 16px 12px;overflow-x:auto}
  .filters button{
    border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
    border-radius:999px;padding:7px 14px;font-size:.82rem;font-family:inherit;
    white-space:nowrap;cursor:pointer;transition:all .15s;
  }
  .filters button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}

  /* hint */
  .hint-bar{
    margin:0 18px 12px;padding:11px 14px;background:var(--accent-soft);
    border:1px solid var(--accent);border-radius:12px;font-size:.8rem;color:var(--ink);
    line-height:1.6;display:flex;gap:10px;align-items:flex-start;
  }
  .hint-bar .x{margin-left:auto;border:none;background:none;color:var(--ink-soft);
    font-size:1rem;cursor:pointer;padding:0 2px;font-family:inherit;flex-shrink:0}

  /* recommendation */
  .rec-wrap{margin:0 14px 16px;padding:13px 14px 14px;background:var(--rec);
    border:1px solid var(--line);border-radius:14px}
  .rec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .rec-head .t{font-size:.85rem;font-weight:700;color:var(--ink)}
  .rec-head .re{border:none;background:none;color:var(--accent);font-size:.78rem;
    font-family:inherit;font-weight:700;cursor:pointer;padding:2px 4px}
  .rec-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}

  main{padding:0 14px}
  .cat{margin-bottom:14px}
  .cat h2{font-size:.78rem;color:var(--ink-soft);font-weight:700;padding:4px 4px;letter-spacing:.1em}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}

  .item{
    background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:11px;
    padding:8px 7px 7px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;min-height:66px;text-align:center;cursor:pointer;
    transition:transform .1s, background .2s, opacity .2s;position:relative;overflow:hidden;
  }
  .item:active{transform:scale(.96)}
  .item .ico{position:absolute;top:4px;left:5px;font-size:.7rem;opacity:.75}
  .item .star{position:absolute;top:3px;right:5px;font-size:.72rem;color:var(--highlight-ink);opacity:0}
  .item.fav .star{opacity:1}
  .item .name{font-size:.82rem;line-height:1.25;overflow-wrap:anywhere;word-break:break-word;margin-top:3px}
  .item .name.long{font-size:.72rem;line-height:1.2}
  .item .name.xlong{font-size:.63rem;line-height:1.18}
  .item .ago{font-size:.65rem;color:var(--ink-soft);white-space:nowrap}
  .item.fresh-hl{background:var(--highlight)}
  .item.fresh-hl .ago{color:var(--highlight-ink);font-weight:700}
  .item.done-today{background:var(--accent-soft)}
  .item.done-today .ago{color:var(--accent);font-weight:700}
  .item.done-today::after{content:"✓";position:absolute;bottom:4px;right:6px;font-size:.7rem;color:var(--accent);font-weight:700}
  .item.dimmed{opacity:.4}
  .item .subn{position:absolute;bottom:4px;left:6px;font-size:.6rem;color:var(--ink-soft);letter-spacing:-.05em}

  /* sub-choice bottom sheet */
  #sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;
    transition:opacity .2s;z-index:60}
  #sheet-bg.show{opacity:1;pointer-events:auto}
  #sheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg);
    border-radius:18px 18px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .25s;z-index:61;max-width:560px;margin:0 auto}
  #sheet.show{transform:translateY(0)}
  #sheet .sh-title{font-size:1rem;font-weight:700;margin-bottom:3px}
  #sheet .sh-sub{font-size:.78rem;color:var(--ink-soft);margin-bottom:14px}
  #sheet .sh-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  #sheet .sh-opt{border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:12px;padding:14px 10px;font-size:.95rem;font-family:inherit;cursor:pointer;transition:transform .1s}
  #sheet .sh-opt:active{transform:scale(.97)}
  #sheet .sh-opt.omakase{border-color:var(--accent);color:var(--accent);font-weight:700}
  #sheet .sh-foot{display:flex;gap:8px;margin-top:4px}
  #sheet .sh-foot button{flex:1;border:1px solid var(--line);background:none;color:var(--ink-soft);
    border-radius:12px;padding:12px;font-size:.85rem;font-family:inherit;cursor:pointer}
  #sheet .sh-foot button.plain{color:var(--ink)}

  /* mood strip */
  .mood{margin:0 14px 14px;padding:11px 14px;background:var(--card);border:1px solid var(--line);
    border-radius:14px}
  .mood .ml{font-size:.76rem;color:var(--ink-soft);margin-bottom:9px}
  .mood .mbtns{display:flex;gap:7px}
  .mood .mb{flex:1;border:1px solid var(--line);background:var(--bg);border-radius:11px;
    padding:9px 4px;font-size:.8rem;font-family:inherit;cursor:pointer;color:var(--ink);
    display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s}
  .mood .mb .dot{font-size:1.1rem;line-height:1}
  .mood .mb.on{border-width:2px;font-weight:700}
  .mood .mb.low.on{border-color:#6c8fc0;background:#6c8fc015}
  .mood .mb.mid.on{border-color:#d09a4e;background:#d09a4e15}
  .mood .mb.high.on{border-color:#c87b6b;background:#c87b6b15}
  .mood .mclear{font-size:.72rem;color:var(--ink-soft);margin-top:8px;text-align:center}
  .mood .mclear button{border:none;background:none;color:var(--accent);font-family:inherit;
    font-size:.72rem;cursor:pointer;text-decoration:underline}

  /* sub editor (inline, edit screen) */
  .sub-edit{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
  .sub-edit .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .sub-edit .chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg);
    border:1px solid var(--line);border-radius:999px;padding:5px 6px 5px 11px;font-size:.82rem}
  .sub-edit .chip button{border:none;background:none;color:var(--danger);font-size:.8rem;
    cursor:pointer;font-family:inherit;padding:0 2px}
  .sub-edit .addsub{display:flex;gap:6px}
  .sub-edit .addsub input{flex:1;border:1px solid var(--line);border-radius:9px;padding:7px 10px;
    font-family:inherit;font-size:.85rem;background:var(--bg);color:var(--ink)}
  .sub-edit .addsub button{border:none;background:var(--accent);color:#fff;border-radius:9px;
    padding:0 14px;font-family:inherit;font-weight:700;font-size:.85rem;cursor:pointer}
  .sub-edit .none{font-size:.76rem;color:var(--ink-soft);margin-bottom:8px}

  .toggle-hidden{width:100%;border:none;background:none;color:var(--ink-soft);
    font-size:.8rem;padding:10px;font-family:inherit;cursor:pointer}

  /* daily tab */
  .daily-head{padding:6px 6px 12px;font-size:.82rem;color:var(--ink-soft)}
  .daily-row{background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:11px;
    padding:13px 14px;margin-bottom:7px;display:flex;align-items:center;gap:13px;cursor:pointer}
  .daily-row .dname{flex:1;font-size:.98rem}
  .daily-row .dago{font-size:.72rem;color:var(--ink-soft)}
  .daily-row .dcheck{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:transparent}
  .daily-row.done{background:var(--accent-soft)}
  .daily-row.done .dcheck{background:var(--accent);border-color:var(--accent);color:#fff}
  .daily-row.done .dago{color:var(--accent);font-weight:700}

  /* tabs */
  nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);
    display:flex;padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;border:none;background:none;font-family:inherit;padding:11px 0 9px;
    font-size:.66rem;color:var(--ink-soft);cursor:pointer;white-space:nowrap}
  nav button .ico{display:block;font-size:1.15rem;margin-bottom:2px}
  nav button.active{color:var(--accent);font-weight:700}

  /* good things tab */
  .good-intro{font-size:.8rem;color:var(--ink-soft);padding:4px 4px 12px;line-height:1.6}
  .good-form{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px}
  .good-form input,.good-form textarea{width:100%;border:1px solid var(--line);border-radius:10px;
    padding:11px 12px;font-family:inherit;font-size:.95rem;background:var(--bg);color:var(--ink);margin-bottom:8px}
  .good-form textarea{resize:none;font-size:.85rem;min-height:0;height:40px}
  .good-form .why{font-size:.74rem;color:var(--ink-soft);margin:0 2px 6px}
  .good-form button{width:100%;border:none;background:var(--accent);color:#fff;border-radius:10px;
    padding:12px;font-family:inherit;font-weight:700;font-size:.92rem;cursor:pointer}
  .good-item{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--highlight-ink);
    border-radius:11px;padding:11px 13px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start}
  .good-item .gbody{flex:1}
  .good-item .gdate{font-size:.7rem;color:var(--ink-soft);margin-bottom:2px}
  .good-item .gtext{font-size:.95rem;line-height:1.4}
  .good-item .gnote{font-size:.78rem;color:var(--ink-soft);margin-top:3px;line-height:1.4}
  .good-item .gdel{border:none;background:none;color:var(--danger);font-size:.9rem;cursor:pointer;
    font-family:inherit;padding:2px 4px;flex-shrink:0}
  .good-empty{color:var(--ink-soft);font-size:.85rem;text-align:center;padding:24px 0}

  /* good reader popup (reuse #sheet-bg backdrop) */
  #goods-sheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg);
    border-radius:18px 18px 0 0;padding:22px 18px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .25s;z-index:61;max-width:560px;margin:0 auto;text-align:center}
  #goods-sheet.show{transform:translateY(0)}
  #goods-sheet .gs-cap{font-size:.78rem;color:var(--highlight-ink);font-weight:700;margin-bottom:12px}
  #goods-sheet .gs-text{font-size:1.15rem;line-height:1.6;min-height:2.2em;
    display:flex;align-items:center;justify-content:center;padding:6px 4px 4px}
  #goods-sheet .gs-note{font-size:.82rem;color:var(--ink-soft);margin-top:6px;line-height:1.5}
  #goods-sheet .gs-foot{display:flex;gap:8px;margin-top:18px}
  #goods-sheet .gs-foot button{flex:1;border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:12px;padding:12px;font-size:.88rem;font-family:inherit;cursor:pointer}
  #goods-sheet .gs-foot button.more{border-color:var(--accent);color:var(--accent);font-weight:700}

  /* toast */
  #toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:999px;font-size:.85rem;
    opacity:0;pointer-events:none;transition:all .25s;display:flex;gap:14px;align-items:center;
    white-space:nowrap;z-index:50}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #toast button{border:none;background:none;color:var(--highlight-ink);font-family:inherit;
    font-weight:700;font-size:.85rem;cursor:pointer}

  /* review */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:0 0 12px}
  .panel h3{font-size:.85rem;color:var(--ink-soft);margin-bottom:12px;letter-spacing:.08em}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:.85rem}
  .bar-row .label{width:9em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-row .bar{height:10px;border-radius:5px;background:var(--accent);min-width:4px}
  .bar-row .num{color:var(--ink-soft);font-size:.78rem}
  .stat-big{font-size:1.8rem;font-weight:700;color:var(--accent)}
  .stat-sub{font-size:.8rem;color:var(--ink-soft)}
  .empty{color:var(--ink-soft);font-size:.85rem;text-align:center;padding:24px 0}

  /* edit */
  .edit-item{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:7px}
  .edit-item .top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .edit-item .name{flex:1;font-size:.92rem}
  .edit-item .ctrl{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .edit-item select{border:1px solid var(--line);border-radius:8px;padding:5px 6px;
    font-family:inherit;font-size:.76rem;background:var(--bg);color:var(--ink)}
  .edit-item .sbtn{border:1px solid var(--line);background:var(--bg);border-radius:8px;
    padding:5px 9px;font-size:.76rem;font-family:inherit;cursor:pointer;color:var(--ink-soft)}
  .edit-item .sbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .edit-item .star{border:1px solid var(--line);background:var(--bg);border-radius:8px;
    padding:5px 9px;font-size:.8rem;font-family:inherit;cursor:pointer;color:var(--ink-soft)}
  .edit-item .star.on{color:var(--highlight-ink);border-color:var(--highlight-ink)}
  .edit-item .del{border:1px solid var(--danger);background:none;color:var(--danger);
    border-radius:8px;padding:5px 9px;font-size:.76rem;font-family:inherit;cursor:pointer;margin-left:auto}
  .add-row{display:flex;gap:8px;margin:6px 0 16px}
  .add-row input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;
    font-family:inherit;font-size:.95rem;background:var(--card);color:var(--ink)}
  .add-row select{border:1px solid var(--line);border-radius:10px;padding:0 8px;
    font-family:inherit;background:var(--card);color:var(--ink);font-size:.85rem}
  .add-row button{border:none;background:var(--accent);color:#fff;border-radius:10px;
    padding:0 16px;font-family:inherit;font-weight:700;cursor:pointer}
  .io-row{display:flex;gap:10px;margin-top:8px}
  .io-row button,.io-row label{flex:1;text-align:center;border:1px solid var(--line);
    background:var(--card);color:var(--ink);border-radius:10px;padding:11px;font-size:.85rem;
    font-family:inherit;cursor:pointer}

  .view{display:none;animation:fade .25s}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<header>
  <h1>コーピング</h1>
  <span class="date" id="today"></span>
</header>

<div class="view active" id="view-list">
  <div class="filters" id="filters"></div>
  <div id="mood-host"></div>
  <div id="hint-host"></div>
  <div id="rec-host"></div>
  <main id="list"></main>
</div>

<div class="view" id="view-daily">
  <main id="daily"></main>
</div>

<div class="view" id="view-good">
  <main id="good"></main>
</div>

<div class="view" id="view-review">
  <main id="review"></main>
</div>

<div class="view" id="view-edit">
  <main id="edit"></main>
</div>

<nav>
  <button class="active" data-view="list"><span class="ico">🌿</span>コーピング</button>
  <button data-view="daily"><span class="ico">☀️</span>習慣</button>
  <button data-view="good"><span class="ico">✨</span>いいこと</button>
  <button data-view="review"><span class="ico">📊</span>ふり返り</button>
  <button data-view="edit"><span class="ico">✏️</span>編集</button>
</nav>

<div id="toast"><span id="toast-msg"></span><button id="toast-undo">取り消す</button></div>

<div id="sheet-bg"></div>
<div id="sheet">
  <div class="sh-title" id="sh-title"></div>
  <div class="sh-sub">どれにする？</div>
  <div class="sh-grid" id="sh-grid"></div>
  <div class="sh-foot">
    <button class="plain" id="sh-parent">そのまま記録</button>
    <button id="sh-close">閉じる</button>
  </div>
</div>

<div id="goods-sheet">
  <div class="gs-cap">✨ あなたの良かったこと</div>
  <div class="gs-text" id="gs-text"></div>
  <div class="gs-note" id="gs-note"></div>
  <div class="gs-foot">
    <button class="more" id="gs-more">もう一つ ↻</button>
    <button id="gs-close">閉じる</button>
  </div>
</div>

<script>
(function(){
"use strict";
const LS_KEY = "copingAppV2";

const CAT_COLOR = {
  "習慣":"#7f9e86","身体":"#d08a6a","趣味":"#c79a52","環境":"#5f9a8c",
  "外出":"#7d96c2","有償":"#b189b0","今は難しいもの":"#9a9285"
};
const TIME_ICON  = {quick:"⚡",mid:"🌿",long:"🌳"};
const TIME_LABEL = {quick:"1〜2分",mid:"5〜15分",long:"30分〜"};

/* type: daily / coping / both ; time: quick/mid/long ; tags: noCaffeine,noNight,daytimeOnly,notAtWork */
const DEF = {
  categories:["習慣","身体","趣味","環境","外出","有償"],
  items:[
    {id:"i01",name:"青竹を踏む",cat:"習慣",type:"daily",time:"quick",tags:["notAtWork"]},
    {id:"i02",name:"AOTAKE体操",cat:"習慣",type:"daily",time:"mid",tags:["notAtWork"]},
    {id:"i03",name:"と思ってみた法",cat:"習慣",type:"both",time:"quick",tags:[]},
    {id:"i04",name:"瞑想",cat:"習慣",type:"both",time:"mid",tags:[]},
    {id:"i05",name:"深呼吸",cat:"習慣",type:"both",time:"quick",tags:[]},
    {id:"i06",name:"呼吸法",cat:"習慣",type:"both",time:"quick",tags:[]},
    {id:"i07",name:"指を押す",cat:"習慣",type:"both",time:"quick",tags:[]},
    {id:"i08",name:"ストレス把握",cat:"習慣",type:"daily",time:"quick",tags:[]},
    {id:"i09",name:"日記を書く",cat:"習慣",type:"daily",time:"mid",tags:[]},
    {id:"i10",name:"昼寝（コーヒーナップ）",cat:"習慣",type:"coping",time:"mid",tags:["noCaffeine","notAtWork"]},
    {id:"i11",name:"早く寝る",cat:"習慣",type:"daily",time:"long",tags:[]},
    {id:"i12",name:"ストレッチ（YouTube）",cat:"身体",type:"coping",time:"mid",tags:["notAtWork"],subs:["首・肩","全身","寝る前用"]},
    {id:"i13",name:"マッサージ（頭・首・胸・手・足裏）",cat:"身体",type:"coping",time:"mid",tags:[]},
    {id:"i14",name:"耳を引っ張る",cat:"身体",type:"coping",time:"quick",tags:[]},
    {id:"i15",name:"カッサを使う",cat:"身体",type:"coping",time:"mid",tags:["notAtWork"]},
    {id:"i16",name:"筋トレ（腕立て・スクワット・四股・アブローラー）",cat:"身体",type:"coping",time:"mid",tags:["noNight","notAtWork"]},
    {id:"i17",name:"サプリを飲む",cat:"身体",type:"coping",time:"quick",tags:[]},
    {id:"i18",name:"読書（本・マンガ）",cat:"趣味",type:"coping",time:"mid",tags:["notAtWork"],subs:["深夜特急","読みかけの本","マンガ"]},
    {id:"i19",name:"映画",cat:"趣味",type:"coping",time:"long",tags:["notAtWork"]},
    {id:"i20",name:"アニメ",cat:"趣味",type:"coping",time:"long",tags:["notAtWork"]},

function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const d = JSON.parse(raw); if(d && Array.isArray(d.items)) return migrate(d); }
    // migrate from V1 if exists
    const v1 = localStorage.getItem("copingAppV1");
    if(v1){ const d = JSON.parse(v1); if(d && Array.isArray(d.items)) return migrate(d); }
  }catch(e){}
  return JSON.parse(JSON.stringify(DEF));
}
function migrate(d){
  const byId = {}; DEF.items.forEach(it=>byId[it.id]=it);
  // 「今は難しいもの」カテゴリは廃止 → restフラグへ変換
  d.categories = (d.categories || DEF.categories.slice()).filter(c=>c!=="今は難しいもの");
  if(d.categories.length===0) d.categories = DEF.categories.slice();
  d.items = (d.items||[]).map(it=>{
    const base = byId[it.id] || {};
    let cat = it.cat, rest = it.rest;
    if(cat==="今は難しいもの"){ rest = true; cat = (base.cat && base.cat!=="今は難しいもの") ? base.cat : "趣味"; }
    if(rest===undefined) rest = base.rest || false;
    return {
      id: it.id, name: it.name, cat: cat,
      type: it.type || base.type || "coping",
      time: it.time || base.time || "mid",
      tags: it.tags || base.tags || [],
      fav: it.fav || false,
      subs: it.subs || base.subs || [],
      rest: rest
    };
  });
  d.logs = d.logs || [];
  d.goods = d.goods || [];
  // アプリ更新で増えたデフォルト項目を、未所持なら追加（既存項目・編集・記録は保持）
  const have = {}; d.items.forEach(it=>have[it.id]=true);
  DEF.items.forEach(def=>{ if(!have[def.id]) d.items.push(JSON.parse(JSON.stringify(def))); });
  return d;
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch(e){ alert("保存に失敗しました。容量を確認してください。"); }
}

/* ---------- date ---------- */
function dayStr(ts){const d=new Date(ts);return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function daysAgo(ts){const a=new Date();a.setHours(0,0,0,0);const b=new Date(ts);b.setHours(0,0,0,0);return Math.round((a-b)/86400000);}
function lastLogOf(id){let last=null;for(const l of state.logs){if(l.itemId===id&&(!last||l.ts>last))last=l.ts;}return last;}
function doneToday(id){const last=lastLogOf(id);return last!==null && daysAgo(last)===0;}
function agoLabel(id){
  const last=lastLogOf(id);
  if(last===null) return {text:"未記録",cls:""};
  const d=daysAgo(last);
  if(d===0) return {text:"今日",cls:"done-today"};
  if(d===1) return {text:"昨日",cls:""};
  if(d>=10) return {text:d+"日ぶり ✨",cls:"fresh-hl"};
  return {text:d+"日前",cls:""};
}

/* ---------- time context ---------- */
function tctx(){
  const now=new Date();const h=now.getHours();const day=now.getDay();
  return {h, weekday:(day>=1&&day<=5)};
}
function isDimmed(it){
  const {h,weekday}=tctx();const t=it.tags||[];
  if(t.includes("noCaffeine") && h>=15) return true;
  if(t.includes("noNight") && (h>=21||h<5)) return true;
  if(t.includes("daytimeOnly") && (h<8||h>=18)) return true;
  if(t.includes("notAtWork") && weekday && h>=9 && h<17) return true;
  return false;
}
/* rest（お休み中）も含めた総合の「薄く表示」判定 */
function isDim(it){ return !!it.rest || isDimmed(it); }

/* ---------- recommendations ---------- */
function copingPool(){
  return state.items.filter(it=>(it.type==="coping"||it.type==="both"));
}
function pickRecs(n){
  const cand=copingPool().filter(it=>!isDim(it) && (timeFilter==="all"||it.time===timeFilter)
    && !(it.id==="i66" && (!state.goods||state.goods.length===0)));
  const scored=cand.map(it=>{
    const last=lastLogOf(it.id);
    const days=last===null?45:Math.min(daysAgo(last),45);
    const favB=it.fav?14:0;
    return {it,score:days+favB+Math.random()*14};
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,n).map(s=>s.it);
}
function renderRecs(reshuffle){
  const host=document.getElementById("rec-host");host.innerHTML="";
  const recs=pickRecs(3);
  if(recs.length===0) return;
  recIds=recs.map(r=>r.id);

  wrap.innerHTML='<div class="rec-head"><span class="t">ふと、これはどう？</span>'+
    '<button class="re">別のを見る ↻</button></div><div class="rec-cards"></div>';
  const cards=wrap.querySelector(".rec-cards");
  recs.forEach(it=>cards.appendChild(makeCard(it)));
  wrap.querySelector(".re").onclick=()=>renderRecs(true);
  host.appendChild(wrap);
}

/* ---------- card factory (shared by list & recs) ---------- */
function makeCard(it){
  const a=agoLabel(it.id);
  const hasSubs=(it.subs&&it.subs.length>0);
  const div=document.createElement("div");
  div.className="item "+a.cls+(it.fav?" fav":"")+(isDim(it)?" dimmed":"");
  div.style.borderLeftColor=CAT_COLOR[it.cat]||"var(--line)";
  div.innerHTML='<span class="ico"></span><span class="star">★</span>'+
    '<span class="name"></span><span class="ago"></span>'+
    (hasSubs?'<span class="subn">⋯'+it.subs.length+'</span>':'');
  div.querySelector(".ico").textContent=TIME_ICON[it.time]||"";
  const nameEl=div.querySelector(".name");
  nameEl.textContent=it.name;
  const len=it.name.length;
  if(len>=16) nameEl.classList.add("xlong"); else if(len>=9) nameEl.classList.add("long");
  div.querySelector(".ago").textContent=a.text;
  div.onclick=()=> (it.id==="i66") ? openGoodsReader() : (hasSubs ? openSheet(it) : recordLog(it));
  return div;
}

function closeSheet(){

  sheetItem=null;

function omakaseSub(it){
  // 直近に選んだサブは避け、久しぶりのものを優先
  const last={};
  for(const l of state.logs){ if(l.itemId===it.id && l.sub){ if(!last[l.sub]||l.ts>last[l.sub]) last[l.sub]=l.ts; } }
  let recent=null,recentTs=0;
  for(const l of state.logs){ if(l.itemId===it.id && l.sub && l.ts>recentTs){recentTs=l.ts;recent=l.sub;} }
  const pool=it.subs.filter(s=>it.subs.length<=1 || s!==recent);
  // 久しぶり順スコア＋ゆらぎ
  const scored=pool.map(s=>{
    const t=last[s];const days=t?daysAgo(t):60;
    return {s,score:Math.min(days,60)+Math.random()*10};
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored[0].s;
}

/* ---------- record + undo ---------- */
function recordLog(item, sub, omakase){
  const hasSubs=item.subs&&item.subs.length>0;
  if(!hasSubs && !sub && doneToday(item.id)){ // 通常項目は再タップで当日分を取り消し
    const idx=[...state.logs].reverse().findIndex(l=>l.itemId===item.id && daysAgo(l.ts)===0);
    if(idx>=0){const real=state.logs.length-1-idx;state.logs.splice(real,1);}
    save();refreshAll();showToast("「"+item.name+"」 取り消しました");return;
  }
  const log={itemId:item.id,ts:Date.now()};if(sub)log.sub=sub;if(currentMood)log.mood=currentMood;
  state.logs.push(log);lastLog=log;
  save();refreshAll();
  let msg=omakase ? ("おまかせ →「"+sub+"」 ✓") : ("「"+item.name+(sub?"＞"+sub:"")+"」 やった ✓");
  showToast(msg);
}
function refreshAll(){
  renderRecs();renderList();
  if(document.getElementById("view-daily").classList.contains("active")) renderDaily();
}
function showToast(msg){
  const t=document.getElementById("toast");document.getElementById("toast-msg").textContent=msg;
  t.classList.add("show");clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),4000);
}
document.getElementById("toast-undo").onclick=()=>{
  if(lastLog){const i=state.logs.indexOf(lastLog);if(i>=0)state.logs.splice(i,1);lastLog=null;save();refreshAll();}
  document.getElementById("toast").classList.remove("show");
};

  const more=document.getElementById("gs-more");
  const arr=state.goods||[];
  if(arr.length===0){
    tEl.textContent="まだありません";
    nEl.textContent="✨いいこと タブで、ためてみてください。";
    more.style.display="none";
  }else{
    const g=pickGood(excludeTs);lastGoodTs=g.ts;
    tEl.textContent=g.text;
    nEl.textContent=g.note?("― "+g.note):"";
    more.style.display=(arr.length>1)?"":"none";
  }
}
function openGoodsReader(){
  // 「いいことを読む」をコーピング実行として静かに記録
  const it=state.items.find(i=>i.id==="i66");
  if(it){const log={itemId:it.id,ts:Date.now()};if(currentMood)log.mood=currentMood;
    state.logs.push(log);lastLog=log;save();renderRecs();renderList();}
  showGood(null);
  document.getElementById("sheet-bg").classList.add("show");
  document.getElementById("goods-sheet").classList.add("show");
}
function closeGoods(){
  document.getElementById("goods-sheet").classList.remove("show");
  if(!document.getElementById("sheet").classList.contains("show"))
    document.getElementById("sheet-bg").classList.remove("show");
}
document.getElementById("gs-more").onclick=()=>showGood(lastGoodTs);
document.getElementById("gs-close").onclick=closeGoods;

/* ---------- review ---------- */
function renderReview(){
  const root=document.getElementById("review");root.innerHTML="";
  const now=new Date();
  const ms=new Date(now.getFullYear(),now.getMonth(),1).getTime();
  const ps=new Date(now.getFullYear(),now.getMonth()-1,1).getTime();
  const tm=state.logs.filter(l=>l.ts>=ms).length;
  const pm=state.logs.filter(l=>l.ts>=ps&&l.ts<ms).length;
  const p1=document.createElement("div");p1.className="panel";
  p1.innerHTML='<h3>今月の記録</h3><span class="stat-big">'+tm+'</span> <span class="stat-sub">回'+
    (pm>0?'（先月 '+pm+' 回）':'')+'</span>';
  root.appendChild(p1);

  const counts={};for(const l of state.logs)counts[l.itemId]=(counts[l.itemId]||0)+1;
  const ranked=Object.entries(counts).map(([id,n])=>({item:state.items.find(i=>i.id===id),n}))
    .filter(r=>r.item).sort((a,b)=>b.n-a.n).slice(0,5);
  const p2=document.createElement("div");p2.className="panel";p2.innerHTML='<h3>よく使うコーピング</h3>';
  if(ranked.length===0){p2.innerHTML+='<div class="empty">記録が貯まるとここに出ます 🌱</div>';}
  else{const max=ranked[0].n;for(const r of ranked){
    const row=document.createElement("div");row.className="bar-row";
    row.innerHTML='<span class="label"></span><div class="bar"></div><span class="num"></span>';
    row.querySelector(".label").textContent=r.item.name;
    row.querySelector(".bar").style.width=Math.max(8,r.n/max*45)+"%";
    row.querySelector(".num").textContent=r.n+"回";p2.appendChild(row);}}
  root.appendChild(p2);

  // --- ストレスの傾向（mood付きログがある時だけ・聞かずに行動から） ---
  const moodLogs=state.logs.filter(l=>l.mood);
  if(moodLogs.length>0){
    const mp=document.createElement("div");mp.className="panel";mp.innerHTML='<h3>最近のストレスの傾向</h3>';
    const cnt={low:0,mid:0,high:0};moodLogs.forEach(l=>{if(cnt[l.mood]!=null)cnt[l.mood]++;});
    const total=cnt.low+cnt.mid+cnt.high;
    const MLAB={low:["🟦","ざわ"],mid:["🟧","もやもや"],high:["🟥","ぐったり"]};
    for(const k of ["low","mid","high"]){
      const row=document.createElement("div");row.className="bar-row";
      row.innerHTML='<span class="label">'+MLAB[k][0]+' '+MLAB[k][1]+'</span><div class="bar"></div><span class="num"></span>';
      row.querySelector(".bar").style.width=Math.max(4,(total?cnt[k]/total:0)*45)+"%";
      row.querySelector(".num").textContent=cnt[k]+"回";mp.appendChild(row);
    }
    const note=document.createElement("div");note.style.cssText="font-size:.74rem;color:var(--ink-soft);margin-top:8px;line-height:1.6";
    note.textContent="記録した時の感じの内訳です。手帳の総括とは別に、対処した瞬間の傾向が見えます。";
    mp.appendChild(note);
    root.appendChild(mp);

    // 強いストレス時に手に取るもの（行動から推定・評価は聞かない）
    const highByItem={};
    moodLogs.filter(l=>l.mood==="high").forEach(l=>{highByItem[l.itemId]=(highByItem[l.itemId]||0)+1;});
    const hi=Object.entries(highByItem).map(([id,n])=>({item:state.items.find(i=>i.id===id),n}))
      .filter(r=>r.item).sort((a,b)=>b.n-a.n).slice(0,3);
    if(hi.length>0){
      const hp=document.createElement("div");hp.className="panel";hp.innerHTML='<h3>🟥 ぐったりの時に選ぶもの</h3>';
      for(const r of hi){const d=document.createElement("div");
        d.style.cssText="font-size:.92rem;padding:4px 0";
        d.textContent="・"+r.item.name+"（"+r.n+"回）";hp.appendChild(d);}
      const hn=document.createElement("div");hn.style.cssText="font-size:.74rem;color:var(--ink-soft);margin-top:8px;line-height:1.6";
      hn.textContent="繰り返し手に取るものは、あなたに合っている可能性があります。";hp.appendChild(hn);
      root.appendChild(hp);
    }
  }
  const stale=state.items.filter(it=>{
    if(it.rest) return false;
    const last=lastLogOf(it.id);return last!==null&&daysAgo(last)>=30;
  });
  if(stale.length>0){
    const p3=document.createElement("div");p3.className="panel";p3.innerHTML='<h3>30日以上やっていないもの</h3>';
    for(const it of stale){const d=document.createElement("div");
      d.style.cssText="font-size:.9rem;padding:4px 0;color:var(--ink-soft)";
      d.textContent="・"+it.name+"（"+daysAgo(lastLogOf(it.id))+"日）";p3.appendChild(d);}
    const note=document.createElement("div");note.style.cssText="font-size:.75rem;color:var(--ink-soft);margin-top:8px";
    note.textContent="合わなくなったものは、編集画面で整理できます";p3.appendChild(note);
    root.appendChild(p3);
  }
}

/* ---------- edit ---------- */
function renderEdit(){
  const root=document.getElementById("edit");root.innerHTML="";
  const intro=document.createElement("div");
  intro.style.cssText="font-size:.78rem;color:var(--ink-soft);padding:4px 4px 12px;line-height:1.6";
  intro.textContent="追加・カテゴリ変更・所要時間・タイプ（習慣/対症）・お気に入り・削除ができます。下のバックアップでデータ消失に備えられます。";
  root.appendChild(intro);

  const add=document.createElement("div");add.className="add-row";
  add.innerHTML='<input type="text" placeholder="新しいコーピングを追加" maxlength="40"><select></select><button>追加</button>';
  const sel=add.querySelector("select");
  for(const c of state.categories){const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o);}
  add.querySelector("button").onclick=()=>{
    const input=add.querySelector("input");const name=input.value.trim();if(!name)return;
    state.items.push({id:"u"+Date.now(),name,cat:sel.value,type:"coping",time:"mid",tags:[],fav:false,subs:[],rest:false});
    input.value="";save();renderEdit();refreshAll();
  };
  root.appendChild(add);

  const TYPES=[["coping","対症"],["daily","習慣"],["both","両方"]];
  const TIMES=[["quick","⚡"],["mid","🌿"],["long","🌳"]];

  for(const cat of state.categories){
    const items=state.items.filter(i=>i.cat===cat);if(items.length===0)continue;
    const h=document.createElement("h2");
    h.style.cssText="font-size:.8rem;color:var(--ink-soft);padding:8px 4px;letter-spacing:.1em";
    h.textContent="【"+cat+"】";root.appendChild(h);
    for(const it of items){
      const row=document.createElement("div");row.className="edit-item";
      row.style.borderLeftColor=CAT_COLOR[it.cat]||"var(--line)";
      const top=document.createElement("div");top.className="top";
      const nm=document.createElement("span");nm.className="name";
      nm.textContent=it.name+(it.rest?"　💤":"");
      if(it.rest) nm.style.color="var(--ink-soft)";
      const star=document.createElement("button");star.className="star"+(it.fav?" on":"");star.textContent="★";
      star.onclick=()=>{it.fav=!it.fav;save();renderEdit();refreshAll();};
      const rest=document.createElement("button");rest.className="star"+(it.rest?" on":"");
      rest.textContent="💤";rest.title="お休み中（薄く表示・提案しない）";
      rest.style.fontSize=".8rem";
      rest.onclick=()=>{it.rest=!it.rest;save();renderEdit();refreshAll();};
      const del=document.createElement("button");del.className="del";del.textContent="削除";
      del.onclick=()=>{if(confirm("「"+it.name+"」を削除しますか？（記録も消えます）")){
        state.items=state.items.filter(x=>x.id!==it.id);
        state.logs=state.logs.filter(l=>l.itemId!==it.id);save();renderEdit();refreshAll();}};
      top.appendChild(nm);top.appendChild(star);top.appendChild(rest);top.appendChild(del);
      const ctrl=document.createElement("div");ctrl.className="ctrl";
      // category
      const csel=document.createElement("select");
      for(const c of state.categories){const o=document.createElement("option");o.value=c;o.textContent=c;if(c===it.cat)o.selected=true;csel.appendChild(o);}
      csel.onchange=()=>{it.cat=csel.value;save();renderEdit();refreshAll();};
      ctrl.appendChild(csel);
      // type buttons
      for(const [v,lab] of TYPES){const b=document.createElement("button");
        b.className="sbtn"+(it.type===v?" on":"");b.textContent=lab;
        b.onclick=()=>{it.type=v;save();renderEdit();refreshAll();};ctrl.appendChild(b);}
      // time buttons
      for(const [v,lab] of TIMES){const b=document.createElement("button");
        b.className="sbtn"+(it.time===v?" on":"");b.textContent=lab;b.title=TIME_LABEL[v];
        b.onclick=()=>{it.time=v;save();renderEdit();refreshAll();};ctrl.appendChild(b);}
      // sub-choices （インライン編集をトグル）
      const sb=document.createElement("button");sb.className="sbtn"+((it.subs&&it.subs.length)?" on":"")+(openSubId===it.id?" on":"");
      sb.textContent=(it.subs&&it.subs.length)?("候補 "+it.subs.length):"候補+";
      sb.title="サブ候補（中身）を編集";
      sb.onclick=()=>{openSubId=(openSubId===it.id?null:it.id);renderEdit();};
      ctrl.appendChild(sb);
      row.appendChild(top);row.appendChild(ctrl);
      // インライン・サブ候補エディタ
      if(openSubId===it.id){
        const se=document.createElement("div");se.className="sub-edit";
        const chips=document.createElement("div");chips.className="chips";
        if(!it.subs||it.subs.length===0){
          const none=document.createElement("div");none.className="none";
          none.textContent="候補なし（通常項目）。下から中身を足すと選択式になります。";
          se.appendChild(none);
        }else{
          (it.subs||[]).forEach((s,i)=>{
            const c=document.createElement("span");c.className="chip";
            c.innerHTML='<span></span><button title="削除">✕</button>';
            c.querySelector("span").textContent=s;
            c.querySelector("button").onclick=()=>{it.subs.splice(i,1);save();renderEdit();refreshAll();};
            chips.appendChild(c);
          });
          se.appendChild(chips);
        }
        const addr=document.createElement("div");addr.className="addsub";
        addr.innerHTML='<input type="text" placeholder="中身を追加" maxlength="30"><button>追加</button>';
        const inp=addr.querySelector("input");
        const addSub=()=>{const v=inp.value.trim();if(!v)return;
          if(!it.subs)it.subs=[];it.subs.push(v);inp.value="";save();renderEdit();refreshAll();
          setTimeout(()=>{const f=document.querySelector('.edit-item .sub-edit .addsub input');if(f)f.focus();},0);};
        addr.querySelector("button").onclick=addSub;
        inp.addEventListener("keydown",e=>{if(e.key==="Enter")addSub();});
        se.appendChild(addr);
        row.appendChild(se);
      }
      root.appendChild(row);
    }
  }

  const hint=document.createElement("div");
  hint.style.cssText="font-size:.72rem;color:var(--ink-soft);margin:14px 4px 4px;line-height:1.6";
  hint.textContent="タイプ「習慣」は『今日の習慣』タブに、「対症」はコーピング一覧に表示されます。「両方」は両画面に出ます。所要時間（⚡🌿🌳）はフィルターと提案に使われます。「候補」は中身を設定でき、タップ時に選べます。💤は「お休み中」：水泳やゴルフなど今やれないものを、消さずに薄く表示し、提案からも外します。";
  root.appendChild(hint);

  const io=document.createElement("div");io.className="io-row";
  const exp=document.createElement("button");exp.textContent="📤 バックアップ";
  exp.onclick=()=>{const blob=new Blob([JSON.stringify(state,null,1)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="coping-backup-"+dayStr(Date.now())+".json";a.click();};
  const impLabel=document.createElement("label");impLabel.textContent="📥 復元";
  const impInput=document.createElement("input");impInput.type="file";impInput.accept=".json";impInput.style.display="none";
  impInput.onchange=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(r.result);
      if(d&&Array.isArray(d.items)&&Array.isArray(d.logs)){
        if(confirm("現在のデータを上書きして復元しますか？")){state=migrate(d);save();refreshAll();renderEdit();alert("復元しました");}
      }else alert("ファイル形式が正しくありません");
    }catch(err){alert("読み込みに失敗しました");}};r.readAsText(f);};
  impLabel.appendChild(impInput);io.appendChild(exp);io.appendChild(impLabel);root.appendChild(io);
}

/* ---------- tabs ---------- */
document.querySelectorAll("nav button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    document.getElementById("view-"+b.dataset.view).classList.add("active");
    if(b.dataset.view==="daily") renderDaily();
    if(b.dataset.view==="good") renderGood();
    if(b.dataset.view==="review") renderReview();
    if(b.dataset.view==="edit") renderEdit();
    window.scrollTo(0,0);
  };
});

/* ---------- init ---------- */
const now=new Date();const wd=["日","月","火","水","木","金","土"][now.getDay()];
document.getElementById("today").textContent=(now.getMonth()+1)+"/"+now.getDate()+" ("+wd+")";
renderHint();renderMood();renderFilters();renderRecs();renderList();
})();
</script>
